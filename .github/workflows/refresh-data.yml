name: Refresh population data

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-population-data
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch, verify, and propose population data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          set -euo pipefail
          node --version
          npm --version
          gh --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Record current data summary
        id: before
        run: |
          set -euo pipefail
          node <<'NODE'
          const { appendFileSync, readFileSync } = require('node:fs')
          const data = JSON.parse(readFileSync('public/data/population.json', 'utf8'))
          appendFileSync(process.env.GITHUB_OUTPUT, `to_year=${data.metadata.toYear}\n`)
          appendFileSync(process.env.GITHUB_OUTPUT, `record_count=${data.records.length}\n`)
          NODE

      - name: Prepare update branch
        env:
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail
          git fetch origin main

          if git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$UPDATE_BRANCH:refs/remotes/origin/$UPDATE_BRANCH"
            git switch --create "$UPDATE_BRANCH" --track "origin/$UPDATE_BRANCH"

            unexpected_branch_files="$({
              git diff --name-only origin/main...HEAD
            } | awk 'NF && $0 != "public/data/population.json"')"
            if [[ -n "$unexpected_branch_files" ]]; then
              echo "Unexpected files already exist on the update branch:" >&2
              printf '%s\n' "$unexpected_branch_files" >&2
              exit 1
            fi

            git rebase origin/main
          else
            git switch --create "$UPDATE_BRANCH" origin/main
          fi

      - name: Fetch population data from e-Stat
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        run: |
          set -euo pipefail
          npm run data:fetch

      - name: Validate population data
        run: |
          set -euo pipefail
          npm run data:validate

      - name: Run unit tests
        run: |
          set -euo pipefail
          npm test -- --run

      - name: Run lint
        run: |
          set -euo pipefail
          npm run lint

      - name: Build production assets
        run: |
          set -euo pipefail
          npm run build

      - name: Check Git changes
        id: changes
        run: |
          set -euo pipefail

          changed_files="$({
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u)"
          unexpected_files="$(printf '%s\n' "$changed_files" | awk 'NF && $0 != "public/data/population.json"')"

          if [[ -n "$unexpected_files" ]]; then
            echo "Unexpected files were changed:" >&2
            printf '%s\n' "$unexpected_files" >&2
            exit 1
          fi

          if git diff --quiet -- public/data/population.json; then
            echo "No population data changes detected."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            if git diff --quiet origin/main...HEAD -- public/data/population.json; then
              echo "proposal_needed=false" >> "$GITHUB_OUTPUT"
            else
              echo "The update branch already contains population data changes."
              echo "proposal_needed=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Population data changes detected."
          git diff --stat -- public/data/population.json
          echo "data_changed=true" >> "$GITHUB_OUTPUT"
          echo "proposal_needed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request body
        if: steps.changes.outputs.proposal_needed == 'true'
        env:
          BEFORE_TO_YEAR: ${{ steps.before.outputs.to_year }}
          BEFORE_RECORD_COUNT: ${{ steps.before.outputs.record_count }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs')
          const data = JSON.parse(readFileSync('public/data/population.json', 'utf8'))
          const prefectureCount = new Set(
            data.records.map((record) => record.prefectureCode),
          ).size
          const body = `## 更新概要

          e-Stat APIから人口統計を自動取得し、検証済みデータを更新します。

          | 項目 | 更新前 | 更新後 |
          | --- | ---: | ---: |
          | 最新年 | ${process.env.BEFORE_TO_YEAR} | ${data.metadata.toYear} |
          | レコード数 | ${process.env.BEFORE_RECORD_COUNT} | ${data.records.length} |

          - 対象都道府県数: ${prefectureCount}
          - 使用したstatsDataIds: ${data.metadata.statsDataIds.join(', ')}
          - 変更ファイル: \`public/data/population.json\`

          ## 検証結果

          - \`npm run data:validate\`: 成功
          - \`npm test -- --run\`: 成功
          - \`npm run build\`: 成功

          ## 注意事項

          - このPull Requestは自動マージしません。
          - 2025年以降のデータは、統計表IDやe-Statの提供形式の変更などにより自動追加できない可能性があります。
          `
          writeFileSync('.git/refresh-data-pr-body.md', body.replace(/^ {10}/gm, ''))
          NODE

      - name: Commit population data
        if: steps.changes.outputs.data_changed == 'true'
        env:
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail
          if [[ "$(git branch --show-current)" != "$UPDATE_BRANCH" ]]; then
            echo "Refusing to commit outside $UPDATE_BRANCH" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- public/data/population.json
          git commit -m "data: refresh population statistics"

      - name: Push update branch
        if: steps.changes.outputs.data_changed == 'true'
        env:
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail
          if [[ "$UPDATE_BRANCH" == "main" ]]; then
            echo "Refusing to push directly to main" >&2
            exit 1
          fi
          git push --force-with-lease origin "HEAD:refs/heads/$UPDATE_BRANCH"

      - name: Create Pull Request if needed
        if: steps.changes.outputs.proposal_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail
          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --base main \
            --head "$UPDATE_BRANCH" \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing_pr" ]]; then
            echo "Open Pull Request #$existing_pr already uses $UPDATE_BRANCH; no duplicate created."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$UPDATE_BRANCH" \
            --title "data: refresh population statistics" \
            --body-file .git/refresh-data-pr-body.md
