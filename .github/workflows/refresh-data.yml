name: Refresh population data

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-population-data
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch, verify, and propose population data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          set -euo pipefail
          node --version
          npm --version
          gh --version
          git --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Record data summary before update
        id: before
        run: |
          set -euo pipefail
          node <<'NODE'
          const { appendFileSync, readFileSync } = require('node:fs')
          const data = JSON.parse(readFileSync('public/data/population.json', 'utf8'))
          const output = [
            `from_year=${data.metadata.fromYear}`,
            `to_year=${data.metadata.toYear}`,
            `record_count=${data.records.length}`,
            `stats_data_ids=${data.metadata.statsDataIds.join(', ')}`,
          ].join('\n')
          appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`)
          NODE

      - name: Fetch population data from e-Stat
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        run: |
          set -euo pipefail
          npm run data:fetch

      - name: Validate population data
        run: |
          set -euo pipefail
          npm run data:validate

      - name: Run lint
        run: |
          set -euo pipefail
          npm run lint

      - name: Run unit tests
        run: |
          set -euo pipefail
          npm test -- --run

      - name: Build production assets
        run: |
          set -euo pipefail
          npm run build

      - name: Check Git changes
        id: changes
        run: |
          set -euo pipefail

          if ! git check-ignore --quiet dist/index.html; then
            echo "dist must remain ignored by Git." >&2
            exit 1
          fi

          changed_files="$({
            git diff --name-only
            git diff --cached --name-only
            git ls-files --others --exclude-standard
          } | sort -u)"
          unexpected_files="$(printf '%s\n' "$changed_files" | awk 'NF && $0 != "public/data/population.json"')"

          if [[ -n "$unexpected_files" ]]; then
            echo "Unexpected files were changed:" >&2
            printf '%s\n' "$unexpected_files" >&2
            exit 1
          fi

          if git diff --quiet -- public/data/population.json &&
            git diff --cached --quiet -- public/data/population.json; then
            echo "No population data changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Population data changes detected."
          git diff --stat -- public/data/population.json
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Record data summary after update
        if: steps.changes.outputs.changed == 'true'
        id: after
        run: |
          set -euo pipefail
          node <<'NODE'
          const { appendFileSync, readFileSync } = require('node:fs')
          const data = JSON.parse(readFileSync('public/data/population.json', 'utf8'))
          const prefectureCount = new Set(
            data.records.map((record) => record.prefectureCode),
          ).size
          const output = [
            `from_year=${data.metadata.fromYear}`,
            `to_year=${data.metadata.toYear}`,
            `record_count=${data.records.length}`,
            `stats_data_ids=${data.metadata.statsDataIds.join(', ')}`,
            `prefecture_count=${prefectureCount}`,
          ].join('\n')
          appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`)
          NODE

      - name: Create Pull Request body
        if: steps.changes.outputs.changed == 'true'
        env:
          BEFORE_FROM_YEAR: ${{ steps.before.outputs.from_year }}
          BEFORE_TO_YEAR: ${{ steps.before.outputs.to_year }}
          BEFORE_RECORD_COUNT: ${{ steps.before.outputs.record_count }}
          AFTER_FROM_YEAR: ${{ steps.after.outputs.from_year }}
          AFTER_TO_YEAR: ${{ steps.after.outputs.to_year }}
          AFTER_RECORD_COUNT: ${{ steps.after.outputs.record_count }}
          AFTER_STATS_DATA_IDS: ${{ steps.after.outputs.stats_data_ids }}
          AFTER_PREFECTURE_COUNT: ${{ steps.after.outputs.prefecture_count }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { writeFileSync } = require('node:fs')
          const body = `## 更新概要

          e-Stat APIから人口統計を自動取得し、検証済みデータを更新します。

          | 項目 | 更新前 | 更新後 |
          | --- | ---: | ---: |
          | 対象年 | ${process.env.BEFORE_FROM_YEAR}～${process.env.BEFORE_TO_YEAR} | ${process.env.AFTER_FROM_YEAR}～${process.env.AFTER_TO_YEAR} |
          | 最新年 | ${process.env.BEFORE_TO_YEAR} | ${process.env.AFTER_TO_YEAR} |
          | レコード数 | ${process.env.BEFORE_RECORD_COUNT} | ${process.env.AFTER_RECORD_COUNT} |

          - 対象都道府県数: ${process.env.AFTER_PREFECTURE_COUNT}
          - 使用したstatsDataIds: ${process.env.AFTER_STATS_DATA_IDS}
          - 変更ファイル: \`public/data/population.json\` のみ

          ## 検証結果

          - \`npm run data:validate\`: 成功
          - \`npm run lint\`: 成功
          - \`npm test -- --run\`: 成功
          - \`npm run build\`: 成功

          ## 確認事項

          - このPull Requestは自動マージしません。
          - 人口値と系列接続を人間が確認してからマージしてください。
          - 2025年以降のデータは、統計表IDや時間コードの変更により自動追加できない可能性があります。
          `
          writeFileSync('.git/refresh-data-pr-body.md', body.replace(/^ {10}/gm, ''))
          NODE

      - name: Commit population data
        if: steps.changes.outputs.changed == 'true'
        env:
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "+refs/heads/$UPDATE_BRANCH:refs/remotes/origin/$UPDATE_BRANCH"
          fi

          git switch --force-create "$UPDATE_BRANCH" main
          if [[ "$(git branch --show-current)" != "$UPDATE_BRANCH" ]]; then
            echo "Refusing to commit outside $UPDATE_BRANCH" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- public/data/population.json

          staged_files="$(git diff --cached --name-only)"
          if [[ "$staged_files" != "public/data/population.json" ]]; then
            echo "Only public/data/population.json may be committed." >&2
            printf '%s\n' "$staged_files" >&2
            exit 1
          fi

          git commit -m "data: refresh population statistics"

      - name: Push update branch
        if: steps.changes.outputs.changed == 'true'
        env:
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail
          if [[ "$UPDATE_BRANCH" == "main" ]]; then
            echo "Refusing to push directly to main" >&2
            exit 1
          fi
          git push --force-with-lease origin "HEAD:refs/heads/$UPDATE_BRANCH"

      - name: Create Pull Request if needed
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_BRANCH: automation/refresh-population-data
        run: |
          set -euo pipefail
          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --base main \
            --head "$UPDATE_BRANCH" \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing_pr" ]]; then
            echo "Open Pull Request #$existing_pr already uses $UPDATE_BRANCH; no duplicate created."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$UPDATE_BRANCH" \
            --title "data: refresh population statistics" \
            --body-file .git/refresh-data-pr-body.md
